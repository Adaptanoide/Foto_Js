<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escáner QR y Captura de Fotos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="top-banner">
    <div id="big-number-display">12345</div>
  </div>

  <div class="middle-container">
    <div id="small-number-display">67890</div>
  </div>

  <main>
    <div class="action-container">
      <input type="text" id="qr-input" placeholder="CÓDIGO QR" autofocus />
      <button id="show-photos">📸 Ver fotos</button>
      <button id="download-zip">⬇️ Descargar ZIP</button>
    </div>

    <video id="camera" autoplay playsinline style="display: none;"></video>
    <canvas id="canvas" style="display: none;"></canvas>
  </main>

  <!-- Modal de galería -->
  <div id="photo-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-modal">✖️ Cerrar</button>
      <div id="photo-preview" class="photo-grid"></div>
    </div>
  </div>

  <!-- Modal de aviso al intentar salir -->
  <div id="exit-warning-modal" class="modal hidden">
    <div class="modal-content">
      <p>⚠️ ¡Puede perder las fotos tomadas si sale ahora!</p>
      <button id="force-download-exit">⬇️ Descargar fotos</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
