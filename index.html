<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Escáner QR y Captura de Fotos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="exit-warning-modal" class="modal hidden">
    <div class="modal-content">
      <p>⚠️ ¡Puede perder las fotos tomadas si sale ahora!</p>
      <div class="modal-buttons">
        <button id="force-download-exit">⬇️ Descargar fotos</button>
        <button id="return-to-app">↩️ Volver</button>
      </div>
    </div>
  </div>

  <button id="start-btn" class="fullscreen-btn">CLICK TO START</button>

  <div class="app-content hidden">
    <div class="top-banner">
      <div id="big-number-display">----</div>
    </div>

    <div class="middle-container">
      <div id="small-number-display">-----</div>
    </div>

    <main>
      <div class="action-container">
        <input type="text" id="qr-input" placeholder="Scanner..." autofocus />
        
        <div class="menu-wrapper">
          <button id="menu-toggle" class="menu-toggle"></button>
          <div class="buttons-container collapsed">
            <button id="show-photos">📸 Ver fotos</button>
            <button id="download-zip">⬇️ Descargar ZIP</button>
          </div>
        </div>
      </div>

      <video id="camera" autoplay playsinline style="display: none;"></video>
      <canvas id="canvas" style="display: none;"></canvas>
    </main>

    <div id="photo-modal" class="modal hidden">
      <div class="modal-content">
        <button id="close-modal">↩️ Volver</button>
        <div id="photo-preview" class="photo-grid"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
