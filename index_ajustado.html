<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanner QR & Captura de Fotos</title>
  <link rel="stylesheet" href="style_ajustado.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>

  <!-- Alerta de saída -->
  <div id="exit-alert">
    <div id="exit-content">
      <p>Aviso! Suas fotos serão perdidas se sair da página.<br>Baixe agora o arquivo ZIP para salvar tudo.</p>
      <button id="exit-download-btn">📦 Baixar ZIP</button>
    </div>
  </div>

  <!-- Números -->
  <div class="top-banner">
    <div id="big-number-display"></div>
    <div id="small-number-display"></div>
  </div>

  <!-- Área principal -->
  <main>
    <div class="action-container" id="qr-input-container">
      <input type="text" id="qr-input" placeholder="Escaneie o código." autofocus />
    </div>
    <div id="camera-container">
      <video id="camera" autoplay playsinline></video>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
  </main>

  <!-- Rodapé -->
  <div id="button-group">
    <button id="toggle-camera-btn" class="action-btn" aria-label="Mostrar/Ocultar câmera">👁️</button>
    <button id="view-photos-btn" class="action-btn" aria-label="Visualizar fotos tiradas">🖼️<span id="photo-count-badge">0</span></button>
    <button id="export-btn" class="action-btn" aria-label="Exportar lote">📦</button>
  </div>

  <script src="script_ajustado.js"></script>
</body>
</html>
